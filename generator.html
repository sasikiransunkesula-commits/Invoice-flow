<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Generator — InvoiceFlow</title>
  <meta name="description" content="Create a professional invoice in seconds. Free PDF download, no signup required.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Figtree:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="gen-page">

  <!-- GENERATOR NAV -->
  <nav class="gen-nav">
    <div class="gen-nav-inner">
      <a href="index.html" class="logo gen-logo">
        <div class="logo-mark logo-mark-sm">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z" stroke="white" stroke-width="2"/><polyline points="13 2 13 9 20 9" stroke="white" stroke-width="2"/><line x1="8" y1="13" x2="16" y2="13" stroke="white" stroke-width="2"/></svg>
        </div>
        <span class="logo-text">InvoiceFlow</span>
      </a>

      <div class="gen-nav-center">
        <span class="gen-nav-title">Invoice Generator</span>
      </div>

      <div class="gen-nav-actions">
        <button class="btn btn-ghost btn-sm" onclick="saveDraft()" title="Save Draft">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v14a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span class="hide-xs">Save Draft</span>
        </button>
        <button class="btn btn-ghost btn-sm" onclick="resetForm()" title="Reset Form">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          <span class="hide-xs">Reset</span>
        </button>
        <button class="btn btn-ghost btn-sm icon-only" onclick="toggleTheme()" title="Toggle theme">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        <button class="btn btn-outline btn-sm" onclick="printInvoice()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print
        </button>
        <button class="btn btn-primary btn-sm" onclick="downloadPDF()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF
        </button>
      </div>
    </div>
  </nav>

  <!-- MOBILE TABS -->
  <div class="mobile-tab-bar">
    <button class="mob-tab active" id="tabForm" onclick="switchTab('form')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit
    </button>
    <button class="mob-tab" id="tabPreview" onclick="switchTab('preview')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      Preview
    </button>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="gen-layout">

    <!-- FORM PANEL -->
    <div class="gen-form-panel" id="genFormPanel">
      <div class="form-scroll">

        <!-- SECTION: YOUR BUSINESS -->
        <div class="form-section">
          <h3 class="fsec-title">
            <div class="fsec-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
            </div>
            Your Business
          </h3>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Company / Your Name</label>
              <input type="text" id="fromName" class="form-input" placeholder="Acme Studio" oninput="updatePreview()">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Logo <span class="form-optional">optional</span></label>
            <div class="logo-upload" id="logoUpload" onclick="document.getElementById('logoFile').click()">
              <img id="logoThumb" alt="Logo" style="display:none">
              <div class="logo-upload-ph" id="logoPh">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <span>Click to upload logo</span>
                <small>PNG, JPG, SVG — max 2MB</small>
              </div>
            </div>
            <input type="file" id="logoFile" accept="image/*" style="display:none" onchange="handleLogoUpload(event)">
            <button class="form-text-btn" id="removeLogoBtn" style="display:none" onclick="removeLogo()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              Remove logo
            </button>
          </div>

          <div class="form-group">
            <label class="form-label">Address</label>
            <textarea id="fromAddress" class="form-input form-textarea" rows="3" placeholder="123 Studio Lane&#10;Mumbai 400001&#10;India" oninput="updatePreview()"></textarea>
          </div>

          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" id="fromEmail" class="form-input" placeholder="hello@acme.com" oninput="updatePreview()">
            </div>
            <div class="form-group">
              <label class="form-label">Phone</label>
              <input type="tel" id="fromPhone" class="form-input" placeholder="+91 98765 43210" oninput="updatePreview()">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">GST / VAT / Tax ID <span class="form-optional">optional</span></label>
            <input type="text" id="fromTaxId" class="form-input" placeholder="GST: 27XXXXX1234X1ZX" oninput="updatePreview()">
          </div>
        </div>

        <!-- SECTION: BILL TO -->
        <div class="form-section">
          <h3 class="fsec-title">
            <div class="fsec-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            Bill To (Client)
          </h3>

          <div class="form-group">
            <label class="form-label">Client / Company Name</label>
            <input type="text" id="toName" class="form-input" placeholder="Kiran Design Co." oninput="updatePreview()">
          </div>

          <div class="form-group">
            <label class="form-label">Address</label>
            <textarea id="toAddress" class="form-input form-textarea" rows="3" placeholder="456 Client Street&#10;Delhi 110001&#10;India" oninput="updatePreview()"></textarea>
          </div>

          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" id="toEmail" class="form-input" placeholder="client@company.com" oninput="updatePreview()">
            </div>
            <div class="form-group">
              <label class="form-label">Phone</label>
              <input type="tel" id="toPhone" class="form-input" placeholder="+91 99999 00000" oninput="updatePreview()">
            </div>
          </div>
        </div>

        <!-- SECTION: INVOICE DETAILS -->
        <div class="form-section">
          <h3 class="fsec-title">
            <div class="fsec-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            Invoice Details
          </h3>

          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">Invoice Number</label>
              <div class="input-addon">
                <input type="text" id="invoiceNumber" class="form-input" placeholder="INV-2026-0001" oninput="updatePreview()">
                <button class="input-addon-btn" onclick="generateInvoiceNumber()" title="Auto-generate number">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Currency</label>
              <select id="currency" class="form-input form-select" onchange="recalculate(); updatePreview()">
                <option value="USD">$ USD — US Dollar</option>
                <option value="EUR">€ EUR — Euro</option>
                <option value="GBP">£ GBP — British Pound</option>
                <option value="INR">₹ INR — Indian Rupee</option>
                <option value="AED">AED — UAE Dirham</option>
                <option value="CAD">CA$ CAD — Canadian Dollar</option>
              </select>
            </div>
          </div>

          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">Issue Date</label>
              <input type="date" id="issueDate" class="form-input" oninput="updatePreview()">
            </div>
            <div class="form-group">
              <label class="form-label">Due Date</label>
              <input type="date" id="dueDate" class="form-input" oninput="updatePreview()">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Default Tax / VAT Rate (%) <span class="form-optional">applied to new items</span></label>
            <input type="number" id="defaultTax" class="form-input" placeholder="0" min="0" max="100" step="0.1" value="0" oninput="updatePreview()">
          </div>
        </div>

        <!-- SECTION: LINE ITEMS -->
        <div class="form-section">
          <h3 class="fsec-title">
            <div class="fsec-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </div>
            Invoice Items
          </h3>

          <div class="items-col-head">
            <span class="ic-desc">Description</span>
            <span class="ic-qty">Qty</span>
            <span class="ic-price">Unit Price</span>
            <span class="ic-tax">Tax %</span>
            <span class="ic-amt">Amount</span>
            <span class="ic-del"></span>
          </div>

          <div id="itemsList" class="items-list">
            <!-- JS renders items here -->
          </div>

          <button class="add-item-btn" onclick="addItem()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Line Item
          </button>
        </div>

        <!-- SECTION: NOTES & TERMS -->
        <div class="form-section">
          <h3 class="fsec-title">
            <div class="fsec-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            </div>
            Notes & Terms
          </h3>

          <div class="form-group">
            <label class="form-label">Notes <span class="form-optional">optional</span></label>
            <textarea id="invoiceNotes" class="form-input form-textarea" rows="3" placeholder="Thank you for your business! Payment is due within 30 days." oninput="updatePreview()"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Payment Details / Bank Info <span class="form-optional">optional</span></label>
            <textarea id="paymentTerms" class="form-input form-textarea" rows="2" placeholder="Bank: HDFC Bank | A/C: XXXX XXXX | IFSC: HDFC0001234" oninput="updatePreview()"></textarea>
          </div>
        </div>

        <!-- MOBILE BOTTOM ACTIONS -->
        <div class="form-mobile-actions">
          <button class="btn btn-outline" onclick="saveDraft()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v14a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save Draft
          </button>
          <button class="btn btn-primary" onclick="downloadPDF()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download PDF
          </button>
        </div>

      </div>
    </div>

    <!-- PREVIEW PANEL -->
    <div class="gen-preview-panel" id="genPreviewPanel">
      <div class="preview-toolbar">
        <span class="preview-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Live Preview
        </span>
        <span class="preview-hint">Updates as you type</span>
      </div>
      <div class="preview-scroll">
        <div class="preview-paper-wrap">
          <div id="invoicePreview" class="invoice-doc">
            <!-- Rendered by JS -->
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- PRINT AREA - Only visible during print -->
  <div id="printArea" class="print-area"></div>

  <!-- TOAST NOTIFICATION -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
